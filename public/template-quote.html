<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Therapy Quote Template</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EFF6FF;
    --text: #1E3A8A;
    --accent: #3B82F6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:#0d0d0d;
    font-family:'Inter', sans-serif;
    padding:120px 0;
  }
  .deck{
    display:flex;
    gap:84px;
    overflow-x:auto;
    padding:24px 72px 72px;
  }
  .slide{
    flex: 0 0 auto;
    width:1080px;
    height:1350px;
    background:var(--bg);
    position:relative;
    overflow:hidden;
    box-shadow:0 36px 90px rgba(0,0,0,0.45);
    color:var(--text);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding: 120px;
    text-align:center;
  }
  .handle {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    font-size: 33px;
    font-weight: 500;
    letter-spacing: 0.05em;
    opacity: 0.6;
  }
  .handle span { font-weight: bold; }
  
  .eyebrow {
    font-size: 36px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 60px;
  }
  
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 96px;
    line-height: 1.3;
    font-style: italic;
    margin-bottom: 60px;
  }
  
  .subtext {
    font-size: 42px;
    line-height: 1.6;
    opacity: 0.8;
  }

  .footer-row {
    position: absolute;
    bottom: 60px;
    width: 100%;
    left: 0;
    font-size: 30px;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="deck" id="carousel-deck">
  <!-- SLIDE 1: COVER -->
  <div class="slide cover">
    <div class="handle">@<span>psychology__insight</span></div>
    <div class="eyebrow" id="s1-eyebrow">Daily Reminder</div>
    <div class="headline" id="s1-headline">"Healing is not linear, and that is perfectly fine."</div>
    <div class="subtext" id="s1-subtext">Take your time. There is no rush to feel better instantly.</div>
    <div class="footer-row">
      <span>R. Preethi, Psychologist</span>
    </div>
  </div>
</div>
</body>
</html>
